<!DOCTYPE html>
<html>
<style type="text/css">
    #header:after {
        content: 'off';
    }

    #header.capslock:after {
        content: 'on';
        background: red;
    }
</style>
<script type="module">
    import { onCapsLockChange, os } from "./index.js";

    logs.innerText += `\nOS: ${os}`;
    logs.innerText += `\nUser Agent: ${navigator.userAgent}`;
    logs.innerText += `\nPlatform: ${navigator.platform}`;
    logs.innerText += `\nMobile: ${navigator.userAgentData?.mobile}`;
    logs.innerText += `\nPlatform (user agent): ${navigator.userAgentData?.platform}`;
    logs.innerText += `\nMax Touch Points: ${navigator.maxTouchPoints}`;
    logs.innerText += `\nGPU: ${navigator.gpu}`;
    navigator.getGamepads().forEach((gamePad) => {
      logs.innerText += `\nGamePad ID: ${gamePad.id}`;
    });
    logs.innerText += `\nNothing8`;
    
    onCapsLockChange((caps) => {
        console.log("capslock is ", caps ? "on" : "off");
        logs.innerText += `\ncapslock is ${caps ? "on" : "off"}`;

        if (caps) {
            document.getElementById('header').classList = ['capslock'];
        } else {
            document.getElementById('header').classList = [];
        }
    });

    navigator.virtualKeyboard.addEventListener("geometrychange", (event) => {
        logs.innerText += "\nVirtual Keyboard";
        const { x, y, width, height } = navigator.virtualKeyboard.boundingRect;

        logs.innerText += `\nX: ${x}`;
        logs.innerText += `\nY: ${y}`;
        logs.innerText += `\nWidth: ${width}`;
        logs.innerText += `\nHeight: ${height}`;
    });

</script>

<body>
    <h1 id="header">Caps-Lock is </h1>
    Type some text or toggle Caps Lock...
    <div id="text"></div>

    <textarea></textarea><br />
    <input type="username" autocomplete="current-username"><br />
    <input type="password" autocomplete="current-password"><br /><br />
    <h2>Logs</h2>
    <pre id="logs"></pre>
</body>

</html>
